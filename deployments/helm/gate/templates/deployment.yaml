{{- include "gate.validateValues" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gate.fullname" . }}
  labels:
    {{- include "gate.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "gate.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Trigger rollout on config changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "gate.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gate.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "gate.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.server.port }}
              protocol: TCP
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- if .Values.config.fips.enabled }}
            - name: GODEBUG
              value: {{ printf "fips140=%s" .Values.config.fips.mode | quote }}
            {{- end }}
            {{- if eq .Values.config.audit.backend "sql" }}
            {{- if .Values.config.audit.sql.dsn }}
            - name: GATE_AUDIT_SQL_DSN
              value: {{ .Values.config.audit.sql.dsn | quote }}
            {{- else if .Values.config.audit.sql.existingSecret.name }}
            - name: GATE_AUDIT_SQL_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.audit.sql.existingSecret.name }}
                  key: {{ .Values.config.audit.sql.existingSecret.key }}
            {{- end }}
            {{- end }}
            {{- if eq .Values.config.selector.type "redis" }}
            {{- if .Values.config.selector.redis.password }}
            - name: GATE_SELECTOR_REDIS_PASSWORD
              value: {{ .Values.config.selector.redis.password | quote }}
            {{- else if .Values.config.selector.redis.existingSecret.name }}
            - name: GATE_SELECTOR_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.selector.redis.existingSecret.name }}
                  key: {{ .Values.config.selector.redis.existingSecret.key }}
            {{- end }}
            {{- end }}
            {{- if .Values.config.originVerification.enabled }}
            - name: GATE_ORIGIN_HEADER_VALUE
              valueFrom:
                secretKeyRef:
                  name: {{ include "gate.originVerifySecretName" . }}
                  key: {{ include "gate.originVerifySecretKey" . }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: app-config
              mountPath: /etc/gate
              readOnly: true
            - name: github-apps
              mountPath: /secrets/github-apps
              readOnly: true
            {{- if .Values.config.server.tls.enabled }}
            - name: tls-certs
              mountPath: /certs
              readOnly: true
            {{- end }}
            # emptyDir required for read-only root filesystem
            - name: tmp
              mountPath: /tmp
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- with .Values.sidecars }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        - name: app-config
          configMap:
            name: {{ printf "%s-config" (include "gate.fullname" .) }}
            defaultMode: 0444
        - name: github-apps
          secret:
            secretName: {{ include "gate.githubAppsSecretName" . }}
            defaultMode: 0400
        {{- if .Values.config.server.tls.enabled }}
        - name: tls-certs
          secret:
            secretName: {{ .Values.config.server.tls.secretName }}
            defaultMode: 0400
        {{- end }}
        # emptyDir for /tmp (required for read-only root filesystem)
        - name: tmp
          emptyDir: {}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- else }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - {{ include "gate.name" . }}
                topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
