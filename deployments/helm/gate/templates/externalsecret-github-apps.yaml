{{- if and (eq .Values.config.githubApps.strategy "externalSecret") .Values.config.githubApps.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ printf "%s-github-apps" (include "gate.fullname" .) }}
  labels:
    {{- include "gate.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.config.githubApps.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ if .Values.externalSecrets.secretStore.create }}{{ .Values.externalSecrets.secretStore.name }}{{ else }}{{ .Values.config.githubApps.externalSecret.secretStoreName }}{{ end }}
    kind: SecretStore
  target:
    name: {{ printf "%s-github-apps" (include "gate.fullname" .) }}
    creationPolicy: Owner
    template:
      metadata:
        labels:
          {{- include "gate.labels" . | nindent 10 }}
      data:
        {{- range $index, $app := .Values.config.githubApps.apps }}
        # Extract private key for app {{ $index }} from remote secret JSON array
        app-{{ $index }}.pem: |
          {{`{{ index (index (fromJson .remoteApps) `}}{{ $index }}{{`) "private_key" }}`}}
        {{- end }}
  data:
    # Fetch the GitHub Apps JSON array from remote secret
    - secretKey: remoteApps
      remoteRef:
        key: {{ .Values.config.githubApps.externalSecret.remoteSecretName }}
{{- end }}
