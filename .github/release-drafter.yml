name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "🚀 Features"
    labels:
      - "feature"
      - "enhancement"
      - "minor-release"
  - title: "🐛 Bugfixes"
    labels:
      - "fix"
      - "bugfix"
      - "bug"
      - "patch-release"
  - title: "🧰 Maintenance"
    labels:
      - "chore"
      - "maintenance"
      - "dependencies"
      - "patch-release"
  - title: "Infrastructure"
    labels:
      - "infrastructure"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'
autolabeler:
  - label: "maintenance"
    files:
      - "*.md"
    branch:
      - '/dependabot\/.+/i'
  - label: "bug"
    branch:
      - '/fix\/.+/'
    title:
      - "/fix/i"
  - label: "enhancement"
    branch:
      - '/feature\/.+/'
    body:
      - '/AB\#[0-9]+/'
  - label: "infrastructure"
    files:
      - "deployments/terraform/**/*"
version-resolver:
  major:
    labels:
      - "major-release"
  minor:
    labels:
      - "minor-release"
  patch:
    labels:
      - "patch-release"
  default: patch
template: |
  ## Changes since $PREVIOUS_TAG

  $CHANGES
