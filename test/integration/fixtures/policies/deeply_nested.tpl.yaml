# Trust Policy Template: Deeply Nested Structure
#
# Tests parsing of valid but deeply nested policy structure with
# multiple policies requiring different environment conditions.

version: "1.0"

trust_policies:
  - name: "policy-one"
    issuer: "{{ISSUER_URL}}"
    rules:
      - name: "rule-1"
        conditions:
          - field: "repository"
            pattern: "example-org/example-repo"
          - field: "ref"
            pattern: "refs/heads/main"
          - field: "environment"
            pattern: "development"
        logic: "AND"
      - name: "rule-2"
        conditions:
          - field: "repository"
            pattern: "example-org/example-repo"
          - field: "ref"
            pattern: "refs/heads/develop"
        logic: "AND"
    permissions:
      contents: "read"
      metadata: "read"
  - name: "policy-two"
    issuer: "{{ISSUER_URL}}"
    rules:
      - name: "rule-1"
        conditions:
          - field: "repository"
            pattern: "example-org/example-repo"
          - field: "environment"
            pattern: "staging"
        logic: "AND"
    permissions:
      contents: "write"
      metadata: "read"
  - name: "policy-three"
    issuer: "{{ISSUER_URL}}"
    rules:
      - name: "rule-1"
        conditions:
          - field: "repository"
            pattern: "example-org/example-repo"
          - field: "environment"
            pattern: "production"
        logic: "AND"
    permissions:
      contents: "write"
      packages: "write"
      metadata: "read"
