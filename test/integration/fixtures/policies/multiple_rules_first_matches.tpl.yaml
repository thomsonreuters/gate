# Trust Policy Template: Multiple Rules - First Matches
#
# Contains multiple rules where the first rule matches the request.

version: "1.0"

trust_policies:
  - name: "default"
    issuer: "{{ISSUER_URL}}"
    rules:
      - name: "main-branch"
        conditions:
          - field: "repository"
            pattern: "example-org/example-repo"
          - field: "ref"
            pattern: "refs/heads/main"
        logic: "AND"
      - name: "develop-branch"
        conditions:
          - field: "repository"
            pattern: "example-org/example-repo"
          - field: "ref"
            pattern: "refs/heads/develop"
        logic: "AND"
      - name: "feature-branches"
        conditions:
          - field: "repository"
            pattern: "example-org/example-repo"
          - field: "ref"
            pattern: "refs/heads/feature/.*"
        logic: "AND"
    permissions:
      contents: "read"
      metadata: "read"
