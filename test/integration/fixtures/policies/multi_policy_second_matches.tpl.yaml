# Trust Policy Template: Multiple Policies - Second Matches
#
# Contains three policies where only the second one matches the test conditions.
# Tests that the service correctly evaluates policies in order and selects the
# first matching policy.

version: "1.0"

trust_policies:
  - name: "first-policy"
    issuer: "{{ISSUER_URL}}"
    rules:
      - name: "different-repo"
        conditions:
          - field: "repository"
            pattern: "example-org/different-repo"
        logic: "AND"
    permissions:
      contents: "read"
  - name: "second-policy"
    issuer: "{{ISSUER_URL}}"
    rules:
      - name: "match-testrepo"
        conditions:
          - field: "repository"
            pattern: "example-org/example-repo"
        logic: "AND"
    permissions:
      contents: "write"
      metadata: "read"
  - name: "third-policy"
    issuer: "{{ISSUER_URL}}"
    rules:
      - name: "different-ref"
        conditions:
          - field: "repository"
            pattern: "example-org/example-repo"
          - field: "ref"
            pattern: "refs/heads/develop"
        logic: "AND"
    permissions:
      contents: "read"
