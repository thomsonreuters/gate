# Trust Policy Template: Tag References
#
# Tests matching tag references for release deployments.

version: "1.0"

trust_policies:
  - name: "default"
    issuer: "{{ISSUER_URL}}"
    rules:
      - name: "version-tags"
        conditions:
          - field: "repository"
            pattern: "example-org/example-repo"
          - field: "ref"
            pattern: "^refs/tags/v[0-9]+\\.[0-9]+\\.[0-9]+$"
        logic: "AND"
    permissions:
      contents: "read"
      packages: "write"
