# Trust Policy Template: Unicode Content
#
# Tests policy parsing with Unicode characters in names.
# Verifies YAML parser handles UTF-8 correctly.

version: "1.0"

trust_policies:
  - name: "déploiement"
    issuer: "{{ISSUER_URL}}"
    rules:
      - name: "règle-principale"
        conditions:
          - field: "repository"
            pattern: "example-org/example-repo"
        logic: "AND"
    permissions:
      contents: "read"
      metadata: "read"
  - name: "展開ポリシー"
    issuer: "{{ISSUER_URL}}"
    rules:
      - name: "主要ルール"
        conditions:
          - field: "repository"
            pattern: "example-org/example-repo"
        logic: "AND"
    permissions:
      contents: "read"
      metadata: "read"
  - name: "política"
    issuer: "{{ISSUER_URL}}"
    rules:
      - name: "regla-principal"
        conditions:
          - field: "repository"
            pattern: "example-org/example-repo"
        logic: "AND"
    permissions:
      contents: "read"
      metadata: "read"
