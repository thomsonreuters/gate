# Trust Policy Template: Maximum Permission Level
#
# Tests the maximum permission level (write) for repository_projects.

version: "1.0"

trust_policies:
  - name: "default"
    issuer: "{{ISSUER_URL}}"
    rules:
      - name: "allow-all"
        conditions:
          - field: "repository"
            pattern: "example-org/example-repo"
        logic: "AND"
    permissions:
      contents: "read"
      metadata: "read"
      repository_projects: "write"
