# Integration Test Configuration
#
# This file configures the integration test harness.
# Override values with environment variables or by providing a different config file.

# STS service configuration
sts:
  # Endpoint for the STS service (can be local or remote)
  endpoint: "http://localhost:8080"
  # Request timeout
  timeout: 30s

# Mock server configuration
mock:
  # Enable mock servers for GitHub API
  enabled: true
  # Port for mock GitHub API server
  api_port: 9001
  # Port for mock GitHub raw content server
  raw_port: 9002

# Test execution settings
execution:
  # Enable parallel test execution
  parallel: true
  # Maximum number of parallel workers
  workers: 10
  # Retry failed tests
  retry: true
  # Number of retry attempts
  retry_count: 2

# Reporting configuration
reporting:
  # Output format: junit, json, html
  format: "junit"
  # Output directory for test results
  output_dir: "./test-results"
