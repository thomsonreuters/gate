# Config file for [Air](https://github.com/air-verse/air) in TOML format

root = "."
tmp_dir = ".air"

[build]
cmd = "GOFLAGS=-buildvcs=false go build -o .air/gate ."
entrypoint = "gate"
full_bin = ".air/gate server -c ${CONFIG_FILE:=config.yaml}"
include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "json"]
exclude_dir = ["local", "tmp", "vendor", ".air", ".volumes", ".ignored", ".vscode", ".github", "certs", "coverage", "bin", "deployments", "test"]
include_dir = []
include_file = []
exclude_file = []
exclude_regex = ["_test\\.go"]
exclude_unchanged = true
follow_symlink = true
poll = true
poll_interval = 500 # milliseconds
log = "air.log"
delay = 0
stop_on_error = true
send_interrupt = false
kill_delay = 500

[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
