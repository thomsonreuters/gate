services:
  postgres:
    image: postgres:18.3@sha256:69e8582b781cb44fa4557b98ed586fe68361e320d9b12f9707494335634f4f3d
    container_name: gate-postgres
    hostname: postgres
    environment:
      - POSTGRES_USER=gate
      - POSTGRES_PASSWORD=gate
      - POSTGRES_DB=gate
    ports:
      - "5432:5432"
    volumes:
      - ./.volumes/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U gate -d gate'"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8.6.1@sha256:1c054d54ecd1597bba52f4304bca5afbc5565ebe614c5b3d7dc5b7f8a0cd768d
    container_name: gate-redis
    hostname: redis
    ports:
      - "6379:6379"
    volumes:
      - ./.volumes/redis:/data

  redis-insight:
    image: redis/redisinsight:3.2.0@sha256:55542a762210bb1cd681410282642bac0970f780f39bc134565394a81b1f1fd9
    container_name: gate-redis-insight
    hostname: redis-insight
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_started

  ministack:
    image: ministackorg/ministack:latest@sha256:a8dbc4d62f348edd328f18b67d6c082b65568f351792e202805780d9110c79e9
    container_name: gate-ministack
    hostname: ministack
    ports:
      - "4566:4566"
    environment:
      - DEBUG=0
    volumes:
      - ./.volumes/ministack:/var/lib/ministack
      - ./ministack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test: ["CMD", "nc", "-z", "-w", "1", "127.0.0.1", "4566"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  adminer:
    image: adminer:5.4.2@sha256:2fb88b98da9f0ae0157d8fcb73f447a0747b09ee8d2ff8a8e0695b30afed2116
    container_name: gate-adminer
    hostname: adminer
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
      - ADMINER_DESIGN=dracula
    healthcheck:
      test: "curl -f localhost:8080 || false"
      interval: 30s
      timeout: 3s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    image: gate-dev
    build:
      context: ..
      dockerfile: ./local/Dockerfile.dev
      args:
        GOLANG_VERSION: ${GOLANG_VERSION:-1.26}
    container_name: gate-migrate
    working_dir: /app
    user: ${HOST_UID}:${HOST_GID}
    entrypoint: ["sh", "-c", "go run . -c ${CONFIG_FILE:-config.yaml} db migrate up"]
    environment:
      - CONFIG_FILE=${CONFIG_FILE:-config.yaml}
      - AWS_ENDPOINT_URL=http://ministack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ../:/app
    depends_on:
      postgres:
        condition: service_healthy
      ministack:
        condition: service_healthy

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:13.3.0@sha256:e0e94bec1fdd27ce2ab304ef954b2cd83d68f91dc1028199d251a0fab83eb17a
    container_name: gate-aspire-dashboard
    hostname: aspire-dashboard
    ports:
      - "18888:18888"   # Dashboard UI
      - "4317:4317"     # OTLP/gRPC receiver (standard port, in-container too)
      - "4318:4318"     # OTLP/HTTP receiver
    environment:
      - DOTNET_DASHBOARD_OTLP_ENDPOINT_URL=http://+:4317
      - DOTNET_DASHBOARD_OTLP_HTTP_ENDPOINT_URL=http://+:4318
      - DASHBOARD__FRONTEND__AUTHMODE=Unsecured
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:18888/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  server:
    image: gate-dev
    build:
      context: ..
      dockerfile: ./local/Dockerfile.dev
      args:
        GOLANG_VERSION: ${GOLANG_VERSION:-1.26}
    container_name: gate-server
    hostname: server
    working_dir: /app
    user: ${HOST_UID}:${HOST_GID}
    command: -c local/.air.toml
    ports:
      - "8080:8080"
    environment:
      - HOME=/tmp
      - CONFIG_FILE=${CONFIG_FILE:-config.yaml}
      - AWS_ENDPOINT_URL=http://ministack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ../:/app
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ministack:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      aspire-dashboard:
        condition: service_started
