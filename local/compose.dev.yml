services:
  postgres:
    image: postgres:18.4@sha256:29ee7bb30d804447dc9a91fd0d74322ae1dc3a4072cc6346f70a5ed6e783b565
    container_name: gate-postgres
    hostname: postgres
    environment:
      - POSTGRES_USER=gate
      - POSTGRES_PASSWORD=gate
      - POSTGRES_DB=gate
    ports:
      - "5432:5432"
    volumes:
      - ./.volumes/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U gate -d gate'"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8.8.0@sha256:0a972391db0b24ec336e35d1bc98b237237e26f82bf5120cf2f6b1688d1df973
    container_name: gate-redis
    hostname: redis
    ports:
      - "6379:6379"
    volumes:
      - ./.volumes/redis:/data

  redis-insight:
    image: redis/redisinsight:3.6.0@sha256:aa21bbd198455b4ad964f76782db951155aa0d712321f599972d1525f031f0e6
    container_name: gate-redis-insight
    hostname: redis-insight
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_started

  ministack:
    image: ministackorg/ministack:1.3.66@sha256:a64f3c3bebff231aa4b6839a5ed4b0c9cffe02dc20bcee0b1b2d440dc3160cea
    container_name: gate-ministack
    hostname: ministack
    ports:
      - "4566:4566"
    environment:
      - DEBUG=0
    volumes:
      - ./.volumes/ministack:/var/lib/ministack
      - ./ministack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test: ["CMD", "nc", "-z", "-w", "1", "127.0.0.1", "4566"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  adminer:
    image: adminer:5.4.2@sha256:4dae499420bb9ba8c5d73745e5c8e02b696acd214b66b5f2946eceee7f171fee
    container_name: gate-adminer
    hostname: adminer
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
      - ADMINER_DESIGN=dracula
    healthcheck:
      test: "curl -f localhost:8080 || false"
      interval: 30s
      timeout: 3s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    image: gate-dev
    build:
      context: ..
      dockerfile: ./local/Dockerfile.dev
      args:
        GOLANG_VERSION: ${GOLANG_VERSION:-1.26}
    container_name: gate-migrate
    working_dir: /app
    user: ${HOST_UID}:${HOST_GID}
    entrypoint: ["sh", "-c", "go run . -c ${CONFIG_FILE:-config.yaml} db migrate up"]
    environment:
      - CONFIG_FILE=${CONFIG_FILE:-config.yaml}
      - AWS_ENDPOINT_URL=http://ministack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ../:/app
    depends_on:
      postgres:
        condition: service_healthy
      ministack:
        condition: service_healthy

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:13.4.2@sha256:cb04a30c7b815476474184564635f60c206d78855261731d8d99a6549bbf483a
    container_name: gate-aspire-dashboard
    hostname: aspire-dashboard
    ports:
      - "18888:18888"   # Dashboard UI
      - "4317:4317"     # OTLP/gRPC receiver (standard port, in-container too)
      - "4318:4318"     # OTLP/HTTP receiver
    environment:
      - DOTNET_DASHBOARD_OTLP_ENDPOINT_URL=http://+:4317
      - DOTNET_DASHBOARD_OTLP_HTTP_ENDPOINT_URL=http://+:4318
      - DASHBOARD__FRONTEND__AUTHMODE=Unsecured
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:18888/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  server:
    image: gate-dev
    build:
      context: ..
      dockerfile: ./local/Dockerfile.dev
      args:
        GOLANG_VERSION: ${GOLANG_VERSION:-1.26}
    container_name: gate-server
    hostname: server
    working_dir: /app
    user: ${HOST_UID}:${HOST_GID}
    command: -c local/.air.toml
    ports:
      - "8080:8080"
    environment:
      - HOME=/tmp
      - CONFIG_FILE=${CONFIG_FILE:-config.yaml}
      - AWS_ENDPOINT_URL=http://ministack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ../:/app
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ministack:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      aspire-dashboard:
        condition: service_started
