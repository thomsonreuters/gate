oidc:
  audience: gate
policy:
  trust_policy_path: ".github/gate/trust-policy.yaml"
server:
  port: 9090
  read_timeout: 60s
  write_timeout: 60s
  shutdown_timeout: 20s
  request_timeout: 60s
  idle_timeout: 20s
  wait_timeout: 20s
logger:
  level: debug
  format: text
selector:
  type: memory
