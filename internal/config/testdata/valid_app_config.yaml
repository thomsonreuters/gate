logger:
  level: info
  format: json

selector:
  type: memory

policy:
  version: "1.0"
  trust_policy_path: ".github/gate/trust-policy.yaml"
  default_token_ttl: 900
  max_token_ttl: 3600
  providers:
    - issuer: https://token.actions.githubusercontent.com
      name: GitHub Actions
      required_claims: {}
      forbidden_claims: {}
  max_permissions:
    contents: read

server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  shutdown_timeout: 10s
  request_timeout: 30s
  idle_timeout: 10s
  wait_timeout: 10s

oidc:
  audience: gate

origin:
  enabled: false

fips:
  enabled: false

github_apps: []
